<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para o Youtube</title>
</head>
<body>
    <form action="https://www.youtube.com/results" method="get">
        <div>
            <label for="search_query">Conteúdo</label>
            <input type="text" placeholder="pesquisar" id="search_query" name="search_query">
        </div>
        <button>Buscar</button>
    </form>
</body>
</html>
