<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Button</title>
</head>
<body>
    <form>
        <input type="radio" name="tipo-do-cafe" id="expresso" value="expresso">
        <label for="expresso">Café Expresso</label>
        <input type="radio" name="tipo-do-cafe" id="coado" value="coado">
        <label for="coado">Café Coado</label>
        <input type="radio" name="tipo-do-cafe" id="com-leite" value="com-leite">
        <label for="com-leite">Café Com Leite</label>
        <button>Submeter</button>
    </form>
</body>
</html>
