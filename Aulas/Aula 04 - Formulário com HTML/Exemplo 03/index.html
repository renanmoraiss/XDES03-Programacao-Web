<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Vagas em Rep</title>
</head>
<body>
    <form action="cadastro">
        <div>
            <label for="nome">Nome Completo</label>
            <input type="text" placeholder="nome" id="nome" name="nome">
        </div>
        <div>
            <label for="curso">Curso</label>
            <input type="text" placeholder="curso" id="curso" name="curso">
        </div>
        <div>
            <label for="idade">Idade</label>
            <input type="text" placeholder="idade" id="idade" name="idade">
        </div>
        <div>
            <label for="cidade">Cidade de Origem</label>
            <input type="text" placeholder="cidade" id="cidade" name="cidade">
        </div>
        <button>Cadastrar</button>
    </form>
</body>
</html>
